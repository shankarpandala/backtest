# ML4T Backtest Documentation
# MkDocs Material configuration with Picasso Blue palette

site_name: ML4T Backtest
site_description: Event-driven backtesting engine with VectorBT Pro validation
site_url: https://ml4trading.io/docs/backtest/
repo_url: https://github.com/ml4t/backtest
repo_name: ml4t/backtest

# Theme configuration - Picasso Blue Period palette
theme:
  name: material
  custom_dir: docs/overrides

  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: ml4t
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: custom
      accent: amber
      toggle:
        icon: material/brightness-4
        name: Switch to light mode

  font:
    text: DM Sans
    code: JetBrains Mono

  features:
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.sections
    - navigation.expand
    - navigation.path
    - navigation.top
    - navigation.footer
    - toc.follow
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.code.annotate
    - content.tabs.link

  icon:
    repo: fontawesome/brands/github

# Custom CSS for Picasso palette
extra_css:
  - stylesheets/ml4t-theme.css

# Extensions
markdown_extensions:
  - abbr
  - admonition
  - attr_list
  - def_list
  - footnotes
  - md_in_html
  - tables
  - toc:
      permalink: true
  - pymdownx.arithmatex:
      generic: true
  - pymdownx.betterem
  - pymdownx.caret
  - pymdownx.details
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.keys
  - pymdownx.magiclink
  - pymdownx.mark
  - pymdownx.smartsymbols
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.tasklist:
      custom_checkbox: true
  - pymdownx.tilde

# Plugins
plugins:
  - search
  - mkdocstrings:
      default_handler: python
      handlers:
        python:
          paths: [src]
          options:
            docstring_style: google
            show_source: true
            show_root_heading: true
            show_root_full_path: false
            show_symbol_type_heading: true
            show_symbol_type_toc: true
            members_order: source
            merge_init_into_class: true
            separate_signature: true
            signature_crossrefs: true

# Navigation structure
nav:
  - Home: index.md
  - Getting Started:
    - Installation: getting-started/installation.md
    - Quickstart: getting-started/quickstart.md
  - Concepts:
    - How It Works: concepts/how-it-works.md
  - User Guide:
    - Strategies: user-guide/strategies.md
    - Order Types: user-guide/orders.md
    - Execution Semantics: user-guide/execution-semantics.md
    - Configuration: user-guide/configuration.md
    - Profiles: user-guide/profiles.md
    - Risk Management: user-guide/risk-management.md
    - Account Policies: user-guide/accounts.md
    - Rebalancing: user-guide/rebalancing.md
    - Data Feed: user-guide/data-feed.md
    - Results & Analysis: user-guide/results.md
    - Market Impact: user-guide/market-impact.md
    - Stateful Strategies: user-guide/stateful-strategies.md
  - Book Guide:
    - book-guide/index.md
  - API Reference:
    - api/index.md

# Extra configuration
extra:
  ml4t_docs_hub_url: /docs/
  ml4t_libraries_url: /libraries/
  ml4t_chapters_url: /chapters/
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/stefan-jansen
    - icon: fontawesome/brands/twitter
      link: https://twitter.com/mlaboratory

  generator: false

